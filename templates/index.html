<div id="course-list">
    <div class="row g-3 mb-4 align-items-end course-row">
        <div class="col-md-5">
            <label class="form-label">Course Name</label>
            <input type="text" name="course_name" class="form-control form-control-lg" placeholder="e.g. LS 101">
        </div>
        <div class="col-md-3">
            <label class="form-label">Grade %</label>
            <input type="number" name="grade" class="form-control form-control-lg" placeholder="0-100" step="0.1" required>
        </div>
        <div class="col-md-2">
            <label class="form-label">Weight</label>
            <input type="number" name="weight" class="form-control form-control-lg" value="0.5" step="0.01" required>
        </div>
        <div class="col-md-2">
            </div>
    </div>
</div>

<div class="d-flex flex-column flex-md-row justify-content-between gap-3 mt-4">
    <button type="button" class="btn btn-outline-dark" onclick="addCourse()">+ Add Course</button>
    <button type="submit" class="btn btn-primary shadow">Calculate Eligibility</button>
</div>

<script>
function addCourse() {
    const container = document.getElementById('course-list');
    const newRow = document.createElement('div');
    newRow.className = 'row g-3 mb-4 align-items-end animate__animated animate__fadeIn course-row';
    
    // We add a "Remove" button only to new rows
    newRow.innerHTML = `
        <div class="col-md-5">
            <input type="text" name="course_name" class="form-control form-control-lg" placeholder="Course Name">
        </div>
        <div class="col-md-3">
            <input type="number" name="grade" class="form-control form-control-lg" placeholder="Grade %" step="0.1" required>
        </div>
        <div class="col-md-2">
            <input type="number" name="weight" class="form-control form-control-lg" value="0.5" step="0.01" required>
        </div>
        <div class="col-md-2">
            <button type="button" class="btn btn-outline-danger w-100" onclick="removeCourse(this)">Remove</button>
        </div>
    `;
    container.appendChild(newRow);
}

function removeCourse(button) {
    // This finds the "row" div that contains the button and deletes it
    const row = button.closest('.course-row');
    row.remove();
}
</script>
